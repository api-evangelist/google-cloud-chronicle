name: Google Cloud Chronicle
description: >-
  Google Cloud Chronicle is a cloud-native security information and event
  management (SIEM) platform that enables enterprises to store, search, and
  analyze massive volumes of security telemetry data. Built on Google
  infrastructure, Chronicle provides sub-second search across petabytes of
  security data, threat detection using rules and intelligence, and
  investigation tools for security operations teams.
