apis:
  - name: Chronicle API
    description: >-
      The Chronicle API provides programmatic access to Chronicle's security analytics platform. Developers can use the
      API to ingest security telemetry, search across normalized security data using UDM (Unified Data Model), manage
      detection rules, investigate alerts, and retrieve threat intelligence. The API supports creating and managing
      detection rules, running retrohunts, and accessing curated threat detections.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/chronicle/docs
    baseURL: https://chronicle.googleapis.com
    tags:
      - Detection Rules
      - Security Events
      - Threat Intelligence
      - UDM Search
