        - type: object
          mapping: $.
    - path: /projects/{projectId}/locations/{location}/instances/{instanceId}/alerts
      name: listalerts
      operations:
      - method: GET
        name: listalerts
        description: Google Cloud Chronicle List alerts
        call: google-cloud-chronicle.listalerts
